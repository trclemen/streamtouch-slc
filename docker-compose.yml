services:
  streamtouch-slc:
    build: .
    container_name: streamtouch-slc
    restart: unless-stopped
    ports:
      - "8300:8300"
    environment:
      - SHIM_HOST=192.168.0.x      # IP of THIS device running SLC
      - SHIM_PORT=8300
      - MA_HOST=192.168.0.x        # IP of your Music Assistant server
      - MA_PORT=8095
    volumes:
      - ./data:/data
